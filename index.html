<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智能刷题练习系统</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide 图标库 -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.544.0/dist/umd/lucide.min.js"></script>
    <!-- GSAP 动画库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- SheetJS for Excel parsing -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- 统一的 Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#64748b',
                        success: '#22c55e',
                        danger: '#ef4444',
                        warning: '#f59e0b',
                        info: '#0ea5e9',
                        light: '#f8fafc',
                        dark: '#1e293b',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        'card': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
                        'card-hover': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .glass-effect {
                background: rgba(255, 255, 255, 0.7);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
            }
            .dark .glass-effect {
                background: rgba(30, 41, 59, 0.7);
            }
            .option-transition {
                transition: all 0.3s ease;
            }
            .progress-gradient {
                background: linear-gradient(90deg, #3b82f6, #0ea5e9);
            }
            .dark .progress-gradient {
                background: linear-gradient(90deg, #60a5fa, #38bdf8);
            }
            .card-hover {
                transition: transform 0.3s ease, box-shadow 0.3s ease;
            }
            .card-hover:hover {
                transform: translateY(-2px);
            }
            .option.selected {
                @apply bg-blue-100 border-blue-500 dark:bg-blue-900 dark:border-blue-400;
            }
            .option.selected .option-marker {
                @apply bg-blue-500 border-blue-500 text-white dark:bg-blue-400 dark:border-blue-400;
            }
            .btn-primary {
                @apply bg-primary text-white font-medium py-2 px-4 rounded-lg shadow transition-all duration-300 hover:bg-primary/90 hover:shadow-lg active:scale-95;
            }
            .btn-secondary {
                @apply bg-secondary text-white font-medium py-2 px-4 rounded-lg shadow transition-all duration-300 hover:bg-secondary/90 hover:shadow-lg active:scale-95;
            }
            .btn-success {
                @apply bg-success text-white font-medium py-2 px-4 rounded-lg shadow transition-all duration-300 hover:bg-success/90 hover:shadow-lg active:scale-95;
            }
            .btn-success:disabled {
                @apply opacity-50 cursor-not-allowed bg-gray-100 dark:bg-gray-800 text-gray-400 dark:text-gray-500 border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-800;
            }
            .btn-danger {
                @apply bg-danger text-white font-medium py-2 px-4 rounded-lg shadow transition-all duration-300 hover:bg-danger/90 hover:shadow-lg active:scale-95;
            }
            .btn-outline {
                @apply border border-gray-300 text-gray-700 font-medium py-2 px-4 rounded-lg shadow-sm transition-all duration-300 hover:bg-gray-50 hover:shadow dark:border-gray-600 dark:text-gray-200 dark:hover:bg-gray-700;
            }
            .btn-outline:disabled {
                @apply opacity-50 cursor-not-allowed bg-gray-100 dark:bg-gray-800 text-gray-400 dark:text-gray-500 border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-800;
            }
            .input-field {
                @apply w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary dark:bg-gray-700 dark:border-gray-600 dark:text-white;
            }
            .badge {
                @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium;
            }
            .badge-primary {
                @apply bg-primary/10 text-primary dark:bg-primary/20;
            }
            .badge-success {
                @apply bg-success/10 text-success dark:bg-success/20;
            }
            .badge-danger {
                @apply bg-danger/10 text-danger dark:bg-danger/20;
            }
            .badge-warning {
                @apply bg-warning/10 text-warning dark:bg-warning/20;
            }
            .sidebar {
                @apply fixed inset-y-0 left-0 z-50 w-64 transform -translate-x-full bg-white shadow-lg transition-transform duration-300 ease-in-out dark:bg-gray-800 overflow-y-auto;
            }
            .sidebar.active {
                @apply translate-x-0;
            }
            .overlay {
                @apply fixed inset-0 z-40 bg-black/50 transition-opacity duration-300 opacity-0 pointer-events-none;
            }
            .overlay.active {
                @apply opacity-100 pointer-events-auto;
            }
            
            /* 响应式设计 - 手机视图优化 */
            @media (max-width: 640px) {
                .header-title {
                    @apply text-lg;
                }
                .question-text {
                    @apply text-lg leading-relaxed;
                }
                .option {
                    @apply p-3;
                }
                .btn-primary, .btn-secondary, .btn-success, .btn-danger {
                    @apply py-3 px-6 text-base;
                }
                .stats-item {
                    @apply p-2;
                }
                .stats-value {
                    @apply text-xl;
                }
                .sidebar {
                    @apply w-56;
                }
                .card-padding-mobile {
                    @apply p-4;
                }
                .card-margin-mobile {
                    @apply mb-4;
                }
                .btn-large-mobile {
                    @apply py-3 text-base;
                }
                .container-mobile {
                    @apply px-3 py-4;
                }
                .stats-grid-mobile {
                    @apply gap-3;
                }
                .stats-card-mobile {
                    @apply p-3;
                }
            }
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-300">
    <div class="container mx-auto px-6 py-6 max-w-4xl container-mobile">
        <!-- 顶部导航栏 -->
        <header class="glass-effect z-30 mb-6 rounded-xl shadow-md">
            <div class="flex items-center justify-between p-4">
                <div class="flex items-center space-x-3">
                    <button id="menu-btn" class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                        <i data-lucide="menu"></i>
                    </button>
                    <h1 class="header-title text-xl font-bold text-primary">智能刷题练习系统</h1>
                </div>
                <div class="flex items-center space-x-2">
                    <!-- 宫格导航按钮 -->
                    <button id="grid-nav-btn" class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors" title="题目导航">
                        <i data-lucide="layout-grid"></i>
                    </button>
                </div>
            </div>
        </header>
        
        <!-- 宫格导航面板 -->
        <div id="grid-nav-panel" class="fixed inset-0 z-50 hidden">
            <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" id="grid-nav-overlay"></div>
            <div class="absolute top-16 right-4 bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-[340px] max-h-[75vh] overflow-hidden border border-gray-100 dark:border-gray-700">
                <!-- 标题栏 -->
                <div class="bg-gradient-to-r from-indigo-500 to-purple-500 px-5 py-4 flex justify-between items-center">
                    <div class="flex items-center space-x-2">
                        <i data-lucide="layout-grid" class="w-5 h-5 text-white/90"></i>
                        <h3 class="font-bold text-lg text-white">题目导航</h3>
                    </div>
                    <button id="close-grid-nav-btn" class="p-1.5 rounded-lg hover:bg-white/20 transition-colors">
                        <i data-lucide="x" class="w-5 h-5 text-white/90"></i>
                    </button>
                </div>
                <!-- 图例 -->
                <div class="flex items-center justify-center gap-3 px-5 py-3 border-b border-gray-100 dark:border-gray-700 bg-gray-50/50 dark:bg-gray-700/30">
                    <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400">
                        <span class="w-2 h-2 rounded-full bg-green-500"></span>正确
                    </span>
                    <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400">
                        <span class="w-2 h-2 rounded-full bg-red-500"></span>错误
                    </span>
                    <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-600 dark:bg-gray-600/30 dark:text-gray-400">
                        <span class="w-2 h-2 rounded-full bg-gray-400"></span>未答
                    </span>
                </div>
                <!-- 宫格 -->
                <div id="grid-nav-container" class="grid grid-cols-5 gap-2.5 p-4 max-h-[50vh] overflow-y-auto">
                    <!-- 动态生成宫格 -->
                </div>
                <!-- 底部统计 -->
                <div id="grid-nav-summary" class="px-5 py-3 border-t border-gray-100 dark:border-gray-700 bg-gray-50/50 dark:bg-gray-700/30 text-xs text-gray-500 dark:text-gray-400 text-center">
                </div>
            </div>
        </div>

        <!-- 题目卡片 -->
        <div id="question-card" class="bg-white dark:bg-gray-800 rounded-xl shadow-md p-6 mb-6 card-hover card-margin-mobile">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center space-x-2">
                    <span id="question-module" class="badge badge-primary">模块</span>
                    <span id="question-type" class="badge badge-secondary">题型</span>
                </div>
                <div class="text-sm text-gray-500 dark:text-gray-400" id="question-id">ID: 001</div>
            </div>
            <h2 id="question-text" class="question-text text-xl font-semibold mb-6 leading-relaxed">题目加载中...</h2>
            
            <div id="options-container" class="space-y-3 mb-6">
                <button class="option w-full text-left p-4 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-blue-50 dark:hover:bg-blue-900/20 hover:border-blue-300 dark:hover:border-blue-700 option-transition" data-option="A">
                    <div class="flex items-center">
                        <div class="w-6 h-6 rounded-full border-2 border-gray-300 dark:border-gray-600 flex items-center justify-center mr-3 option-marker">A</div>
                        <span class="option-text">选项A</span>
                    </div>
                </button>
                <button class="option w-full text-left p-4 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-blue-50 dark:hover:bg-blue-900/20 hover:border-blue-300 dark:hover:border-blue-700 option-transition" data-option="B">
                    <div class="flex items-center">
                        <div class="w-6 h-6 rounded-full border-2 border-gray-300 dark:border-gray-600 flex items-center justify-center mr-3 option-marker">B</div>
                        <span class="option-text">选项B</span>
                    </div>
                </button>
                <button class="option w-full text-left p-4 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-blue-50 dark:hover:bg-blue-900/20 hover:border-blue-300 dark:hover:border-blue-700 option-transition" data-option="C">
                    <div class="flex items-center">
                        <div class="w-6 h-6 rounded-full border-2 border-gray-300 dark:border-gray-600 flex items-center justify-center mr-3 option-marker">C</div>
                        <span class="option-text">选项C</span>
                    </div>
                </button>
                <button class="option w-full text-left p-4 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-blue-50 dark:hover:bg-blue-900/20 hover:border-blue-300 dark:hover:border-blue-700 option-transition" data-option="D">
                    <div class="flex items-center">
                        <div class="w-6 h-6 rounded-full border-2 border-gray-300 dark:border-gray-600 flex items-center justify-center mr-3 option-marker">D</div>
                        <span class="option-text">选项D</span>
                    </div>
                </button>
            </div>
            
            <!-- 反馈区域 -->
            <div id="feedback" class="hidden mb-4 p-4 rounded-lg border"></div>
            
            <!-- 解析区域 -->
            <div id="explanation" class="hidden mb-6 p-4 bg-gray-50 dark:bg-gray-700/50 rounded-lg border border-gray-200 dark:border-gray-700">
                <h3 class="flex items-center text-lg font-semibold mb-2">
                    <i data-lucide="book-open" class="w-5 h-5 mr-2"></i>
                    题目解析
                </h3>
                <p id="explanation-text" class="text-gray-700 dark:text-gray-300"></p>
            </div>
            
            <!-- 操作按钮 -->
            <div class="flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-3">
                <button id="submit-btn" class="btn-success flex-1 flex items-center justify-center btn-large-mobile">
                    <i data-lucide="check-circle" class="w-5 h-5 mr-2"></i>
                    提交答案
                </button>
                <div class="flex space-x-3">
                    <button id="prev-btn" class="btn-outline flex-1 flex items-center justify-center" disabled>
                        <i data-lucide="chevron-left" class="w-5 h-5 mr-2"></i>
                        上一题
                    </button>
                    <button id="next-btn" class="btn-outline flex-1 flex items-center justify-center">
                        下一题
                        <i data-lucide="chevron-right" class="w-5 h-5 ml-2"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- 学习进度区域 -->
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-md p-6 mb-6 card-margin-mobile">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-lg font-semibold">学习进度</h2>
                <div class="text-sm text-gray-500 dark:text-gray-400">
                    <span id="current-question">第 1 题</span> / <span id="total-questions">共 10 题</span>
                </div>
            </div>
            <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2.5 mb-4">
                <div id="progress-fill" class="progress-gradient h-2.5 rounded-full" style="width: 0%"></div>
            </div>
            <div class="grid grid-cols-3 gap-4">
                <div class="stats-item text-center p-3 rounded-lg bg-green-50 dark:bg-green-900/20 cursor-pointer hover:bg-green-100 dark:hover:bg-green-900/30 transition-colors" data-status="correct">
                    <div class="text-2xl font-bold text-success stats-value" id="correct-count">0</div>
                    <div class="text-sm text-gray-500 dark:text-gray-400">正确</div>
                </div>
                <div class="stats-item text-center p-3 rounded-lg bg-red-50 dark:bg-red-900/20 cursor-pointer hover:bg-red-100 dark:hover:bg-red-900/30 transition-colors" data-status="incorrect">
                    <div class="text-2xl font-bold text-danger stats-value" id="incorrect-count">0</div>
                    <div class="text-sm text-gray-500 dark:text-gray-400">错误</div>
                </div>
                <div class="stats-item text-center p-3 rounded-lg bg-gray-50 dark:bg-gray-700/50 cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" data-status="unanswered">
                    <div class="text-2xl font-bold text-gray-500 dark:text-gray-400 stats-value" id="remaining-count">10</div>
                    <div class="text-sm text-gray-500 dark:text-gray-400">剩余</div>
                </div>
            </div>
        </div>

        <!-- 学习统计卡片 -->
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-md p-6 mb-6">
            <h2 class="flex items-center text-lg font-semibold mb-4">
                <i data-lucide="bar-chart-3" class="w-5 h-5 mr-2"></i>
                学习统计
            </h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 stats-grid-mobile">
                <div class="bg-blue-50 dark:bg-blue-900/20 p-6 rounded-lg stats-card-mobile">
                    <div class="text-sm text-gray-500 dark:text-gray-400">总题数</div>
                    <div class="text-2xl font-bold text-primary" id="total-count">10</div>
                </div>
                <div class="bg-green-50 dark:bg-green-900/20 p-6 rounded-lg stats-card-mobile">
                    <div class="text-sm text-gray-500 dark:text-gray-400">正确率</div>
                    <div class="text-2xl font-bold text-success" id="accuracy-rate">0%</div>
                </div>
                <div class="bg-purple-50 dark:bg-purple-900/20 p-6 rounded-lg stats-card-mobile">
                    <div class="text-sm text-gray-500 dark:text-gray-400">完成率</div>
                    <div class="text-2xl font-bold text-purple-600 dark:text-purple-400" id="completion-rate">0%</div>
                </div>
                <div class="bg-amber-50 dark:bg-amber-900/20 p-6 rounded-lg stats-card-mobile">
                    <div class="text-sm text-gray-500 dark:text-gray-400">学习时长</div>
                    <div class="text-2xl font-bold text-amber-600 dark:text-amber-400" id="study-time">0分钟</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 侧边栏菜单 -->
    <div id="sidebar" class="sidebar">
        <div class="p-6 border-b border-gray-200 dark:border-gray-700">
            <div class="flex items-center justify-between">
                <h2 class="text-lg font-bold text-primary">功能菜单</h2>
                <button id="close-sidebar-btn" class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                    <i data-lucide="x"></i>
                </button>
            </div>
        </div>
        <div class="p-6 space-y-6">
            <!-- 题目筛选 -->
            <div>
                <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-3">题目筛选</h3>
                <div class="space-y-3">
                    <div>
                        <label for="module-select" class="block text-sm font-medium mb-1">按模块筛选</label>
                        <select id="module-select" class="input-field">
                            <option value="all">全部模块</option>
                            <!-- 动态生成的模块选项将在这里显示 -->
                        </select>
                    </div>
                    <div>
                        <label for="type-select" class="block text-sm font-medium mb-1">按题型筛选</label>
                        <select id="type-select" class="input-field">
                            <option value="all">全部题型</option>
                            <!-- 动态生成的题型选项将在这里显示 -->
                        </select>
                    </div>
                    <div>
                        <label for="status-select" class="block text-sm font-medium mb-1">按状态筛选</label>
                        <select id="status-select" class="input-field">
                            <option value="all">全部状态</option>
                            <option value="unanswered">未答题</option>
                            <option value="correct">已答对</option>
                            <option value="incorrect">已答错</option>
                        </select>
                    </div>
                    <button id="apply-filter-btn" class="btn-primary w-full">
                        <i data-lucide="filter" class="w-5 h-5 inline-block mr-2"></i>
                        应用筛选
                    </button>
                </div>
            </div>
            
            <!-- 题目导航 -->
            <div>
                <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-3">题目导航</h3>
                <div class="space-y-3">
                    <div>
                        <label for="question-select" class="block text-sm font-medium mb-1">跳转到题目</label>
                        <select id="question-select" class="input-field">
                            <!-- 动态生成选项 -->
                        </select>
                    </div>
                    <button id="go-to-question-btn" class="btn-primary w-full">
                        <i data-lucide="arrow-right" class="w-5 h-5 inline-block mr-2"></i>
                        跳转到题目
                    </button>
                </div>
            </div>
            
            <!-- 错题集 -->
            <div>
                <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-3">错题集</h3>
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <span class="text-sm">错题数量</span>
                        <span id="wrong-count" class="badge badge-danger">0</span>
                    </div>
                    <button id="start-wrong-practice-btn" class="btn-danger w-full">
                        <i data-lucide="alert-circle" class="w-5 h-5 inline-block mr-2"></i>
                        开始刷错题
                    </button>
                    <button id="view-wrong-set-btn" class="btn-outline w-full">
                        <i data-lucide="list" class="w-5 h-5 inline-block mr-2"></i>
                        查看错题集
                    </button>
                </div>
            </div>
            
            <!-- 学习模式 -->
            <div>
                <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-3">学习模式</h3>
                <div class="space-y-3">
                    <div class="flex items-center justify-between">
                        <span class="text-sm">练习模式</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="practice-mode-toggle" class="sr-only peer" checked>
                            <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 dark:peer-focus:ring-blue-800 rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
                        </label>
                    </div>
                    <div class="text-xs text-gray-500 dark:text-gray-400">
                        练习模式：即时查看答案和解析<br>
                        测试模式：完成后统一查看结果
                    </div>
                </div>
            </div>
            
            <!-- 题库管理 -->
            <div>
                <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-3">题库管理</h3>
                <div class="space-y-3">
                    <div>
                        <label for="import-file" class="block text-sm font-medium mb-1">导入新题库</label>
                        <input type="file" id="import-file" accept=".json,.xlsx" class="input-field">
                        <div class="text-xs text-gray-500 dark:text-gray-400 mt-1">支持JSON和Excel格式题库文件</div>
                    </div>
                    <button id="import-btn" class="btn-primary w-full">
                        <i data-lucide="upload" class="w-5 h-5 inline-block mr-2"></i>
                        导入题库
                    </button>
                    <button id="generate-html-btn" class="btn-success w-full">
                        <i data-lucide="file" class="w-5 h-5 inline-block mr-2"></i>
                        生成独立HTML
                    </button>
                    <button id="download-template-btn" class="btn-secondary w-full">
                        <i data-lucide="download" class="w-5 h-5 inline-block mr-2"></i>
                        下载题库模板
                    </button>
                </div>
            </div>
            
            <!-- 其他功能 -->
            <div>
                <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-3">其他功能</h3>
                <div class="space-y-3">
                    <button id="reset-records-btn" class="btn-outline w-full">
                        <i data-lucide="refresh-cw" class="w-5 h-5 inline-block mr-2"></i>
                        重置刷题记录
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 错题集面板 -->
    <div id="wrong-panel" class="sidebar right-0 left-auto transform translate-x-full">
        <div class="p-6 border-b border-gray-200 dark:border-gray-700">
            <div class="flex items-center justify-between">
                <h2 class="text-lg font-bold text-danger">错题集</h2>
                <button id="close-wrong-panel-btn" class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                    <i data-lucide="x"></i>
                </button>
            </div>
        </div>
        <div class="p-4">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-medium">错题列表</h3>
                <span id="wrong-panel-count" class="badge badge-danger">0</span>
            </div>
            <div id="wrong-list" class="space-y-3 max-h-[calc(100vh-200px)] overflow-y-auto pr-2">
                <div class="text-center text-gray-500 dark:text-gray-400 py-8">
                    <i data-lucide="check-circle" class="w-12 h-12 mx-auto mb-2 text-green-500"></i>
                    <p>太棒了！暂无错题</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 状态筛选面板 -->
    <div id="status-panel" class="sidebar right-0 left-auto transform translate-x-full">
        <div class="p-6 border-b border-gray-200 dark:border-gray-700">
            <div class="flex items-center justify-between">
                <h2 id="status-panel-title" class="text-lg font-bold">题目列表</h2>
                <button id="close-status-panel-btn" class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                    <i data-lucide="x"></i>
                </button>
            </div>
        </div>
        <div class="p-4">
            <div id="status-list" class="space-y-3 max-h-[calc(100vh-150px)] overflow-y-auto pr-2">
                <div class="text-center text-gray-500 dark:text-gray-400 py-8">
                    <i data-lucide="loader" class="w-12 h-12 mx-auto mb-2 animate-spin"></i>
                    <p>加载中...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 覆盖层 -->
    <div id="overlay" class="overlay"></div>

    <!-- 提示消息组件 -->
    <div id="toast" class="fixed top-4 right-4 bg-white dark:bg-gray-800 rounded-lg shadow-lg p-4 transform translate-x-full transition-transform duration-300 z-50 max-w-xs">
        <div class="flex items-start">
            <div id="toast-icon" class="flex-shrink-0 w-6 h-6 mr-3 mt-0.5"></div>
            <div class="flex-1">
                <h4 id="toast-title" class="font-medium"></h4>
                <p id="toast-message" class="text-sm text-gray-500 dark:text-gray-400 mt-1"></p>
            </div>
            <button id="close-toast-btn" class="ml-4 text-gray-400 hover:text-gray-500">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <script>

        // ═══════════════════════════════════════════════════════════════
        // 模块一：数据层 - 题目数据、应用状态、DOM元素缓存
        // ═══════════════════════════════════════════════════════════════
        // 题目数据
        const questions = [
            {"模块": "示例模块", "题目类型": "单选", "题目": "这是一道单选题示例", "选项A": "选项A内容", "选项B": "选项B内容", "选项C": "选项C内容", "选项D": "选项D内容", "标准答案": "A", "解析": "这是题目的解析内容", "ID": 1},
            {"模块": "示例模块", "题目类型": "多选", "题目": "这是一道多选题示例", "选项A": "选项A内容", "选项B": "选项B内容", "选项C": "选项C内容", "选项D": "选项D内容", "标准答案": "AB", "解析": "这是题目的解析内容", "ID": 2},
            {"模块": "示例模块", "题目类型": "判断题", "题目": "这是一道判断题示例", "选项A": "正确", "选项B": "错误", "选项C": "", "选项D": "", "标准答案": "A", "解析": "这是题目的解析内容", "ID": 3}
        ];
        const modules = ["示例模块"];
        
        // 应用状态
        let currentQuestionIndex = 0;
        let userAnswers = JSON.parse(localStorage.getItem('userAnswers') || '[]');
        let questionStatus = JSON.parse(localStorage.getItem('questionStatus') || '[]');
        let lastPracticeIndex = parseInt(localStorage.getItem('lastPracticeIndex') || '0');
        let practiceMode = localStorage.getItem('practiceMode') === 'false' ? false : true;
        let studyStartTime = Date.now();
        let studyTime = parseInt(localStorage.getItem('studyTime') || '0');
        
        // 确保数组长度正确且数据有效
        userAnswers = userAnswers || [];
        questionStatus = questionStatus || [];
        
        // 重置数组，确保长度正确且所有状态都有效
        const validStatuses = ['unanswered', 'correct', 'incorrect'];
        const newUserAnswers = new Array(questions.length).fill(null);
        const newQuestionStatus = new Array(questions.length).fill('unanswered');
        
        // 保留有效数据
        for (let i = 0; i < Math.min(userAnswers.length, questions.length); i++) {
            if (userAnswers[i] !== null) {
                newUserAnswers[i] = userAnswers[i];
            }
        }
        
        for (let i = 0; i < Math.min(questionStatus.length, questions.length); i++) {
            if (validStatuses.includes(questionStatus[i])) {
                newQuestionStatus[i] = questionStatus[i];
            }
        }
        
        userAnswers = newUserAnswers;
        questionStatus = newQuestionStatus;
        
        let correctCount = questionStatus.filter(status => status === 'correct').length;
        let incorrectCount = questionStatus.filter(status => status === 'incorrect').length;
        
        // 开始刷错题模式
        let wrongPracticeMode = false;
        let wrongPracticeQuestions = [];
        let wrongPracticeCurrent = 0;
        
        // DOM元素
        const elements = {
            // 导航和主题
            menuBtn: document.getElementById('menu-btn'),
            
            // 进度和统计
            currentQuestion: document.getElementById('current-question'),
            totalQuestions: document.getElementById('total-questions'),
            progressFill: document.getElementById('progress-fill'),
            correctCount: document.getElementById('correct-count'),
            incorrectCount: document.getElementById('incorrect-count'),
            remainingCount: document.getElementById('remaining-count'),
            totalCount: document.getElementById('total-count'),
            accuracyRate: document.getElementById('accuracy-rate'),
            completionRate: document.getElementById('completion-rate'),
            studyTime: document.getElementById('study-time'),
            
            // 题目相关
            questionModule: document.getElementById('question-module'),
            questionType: document.getElementById('question-type'),
            questionId: document.getElementById('question-id'),
            questionText: document.getElementById('question-text'),
            optionsContainer: document.getElementById('options-container'),
            feedback: document.getElementById('feedback'),
            explanation: document.getElementById('explanation'),
            explanationText: document.getElementById('explanation-text'),
            submitBtn: document.getElementById('submit-btn'),
            prevBtn: document.getElementById('prev-btn'),
            nextBtn: document.getElementById('next-btn'),
            
            // 侧边栏
            sidebar: document.getElementById('sidebar'),
            closeSidebarBtn: document.getElementById('close-sidebar-btn'),
            overlay: document.getElementById('overlay'),
            
            // 筛选和导航
            moduleSelect: document.getElementById('module-select'),
            typeSelect: document.getElementById('type-select'),
            statusSelect: document.getElementById('status-select'),
            applyFilterBtn: document.getElementById('apply-filter-btn'),
            questionSelect: document.getElementById('question-select'),
            goToQuestionBtn: document.getElementById('go-to-question-btn'),
            
            // 错题集
            wrongCount: document.getElementById('wrong-count'),
            startWrongPracticeBtn: document.getElementById('start-wrong-practice-btn'),
            viewWrongSetBtn: document.getElementById('view-wrong-set-btn'),
            wrongPanel: document.getElementById('wrong-panel'),
            closeWrongPanelBtn: document.getElementById('close-wrong-panel-btn'),
            wrongList: document.getElementById('wrong-list'),
            wrongPanelCount: document.getElementById('wrong-panel-count'),
            
            // 状态面板
            statusPanel: document.getElementById('status-panel'),
            statusPanelTitle: document.getElementById('status-panel-title'),
            closeStatusPanelBtn: document.getElementById('close-status-panel-btn'),
            statusList: document.getElementById('status-list'),
            
            // 题库管理
            importFile: document.getElementById('import-file'),
            importBtn: document.getElementById('import-btn'),
            generateHtmlBtn: document.getElementById('generate-html-btn'),
            downloadTemplateBtn: document.getElementById('download-template-btn'),
            
            // 其他功能
            practiceModeToggle: document.getElementById('practice-mode-toggle'),
            resetRecordsBtn: document.getElementById('reset-records-btn'),
            
            // 提示消息
            toast: document.getElementById('toast'),
            toastIcon: document.getElementById('toast-icon'),
            toastTitle: document.getElementById('toast-title'),
            toastMessage: document.getElementById('toast-message'),
            closeToastBtn: document.getElementById('close-toast-btn'),
            
            // 宫格导航
            gridNavBtn: document.getElementById('grid-nav-btn'),
            gridNavPanel: document.getElementById('grid-nav-panel'),
            gridNavOverlay: document.getElementById('grid-nav-overlay'),
            closeGridNavBtn: document.getElementById('close-grid-nav-btn'),
            gridNavContainer: document.getElementById('grid-nav-container')
        };
        
        // 初始化函数

        // ═══════════════════════════════════════════════════════════════
        // 模块二：核心逻辑层 - 初始化、事件处理、答题流程、题目加载
        // ═══════════════════════════════════════════════════════════════
        function init() {
            // 初始化数据
            elements.totalQuestions.textContent = `共 ${questions.length} 题`;
            elements.totalCount.textContent = questions.length;
            updateStats();
            updateProgress();
            populateQuestionSelect();
            updateWrongCount();
            updateModuleSelector(); // 动态更新模块选择器
            updateTypeSelector(); // 动态更新题型选择器
            updateStatusSelector(); // 更新状态选择器
            updateGridNav(); // 初始化宫格导航
            
            // 恢复到上次刷题位置
            currentQuestionIndex = lastPracticeIndex;
            if (isNaN(currentQuestionIndex) || currentQuestionIndex < 0 || currentQuestionIndex >= questions.length) {
                currentQuestionIndex = 0;
            }
            
            // 初始化练习模式
            elements.practiceModeToggle.checked = practiceMode;
            
            // 加载题目
            loadQuestion(currentQuestionIndex);
            
            // 页面加载完成后滚动到题目卡片
            window.addEventListener('load', function() {
                const questionCard = document.getElementById('question-card');
                if (questionCard) {
                    questionCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            });

            // 重新添加上一题和下一题按钮的滚动功能
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            
            if (prevBtn) {
                prevBtn.addEventListener('click', function() {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
            }
            
            if (nextBtn) {
                nextBtn.addEventListener('click', function() {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
            }
            
            // 设置事件监听器
            setupEventListeners();
            
            // 启动学习时长计时器
            startStudyTimeTimer();
            
            // 初始化图标
            lucide.createIcons();
            
            // 初始化侧边栏滑动功能
            initSidebarSwipe();
        }
        
        // 设置事件监听器
        function setupEventListeners() {
            // 侧边栏
            elements.menuBtn.addEventListener('click', openSidebar);
            elements.closeSidebarBtn.addEventListener('click', closeSidebar);
            elements.overlay.addEventListener('click', closeAllPanels);
            
            // 选项点击事件
            document.querySelectorAll('.option').forEach(option => {
                option.addEventListener('click', () => {
                    handleOptionClick(option);
                });
            });
            
            // 统计数字点击事件
            document.querySelectorAll('.stats-item').forEach(item => {
                item.addEventListener('click', () => {
                    const status = item.dataset.status;
                    showStatusQuestions(status);
                });
            });
            
            // 提交答案按钮
            elements.submitBtn.addEventListener('click', handleSubmit);
            
            // 导航按钮
            elements.prevBtn.addEventListener('click', handlePrev);
            elements.nextBtn.addEventListener('click', handleNext);
            
            // 跳转到题目
            elements.goToQuestionBtn.addEventListener('click', () => {
                const index = parseInt(elements.questionSelect.value);
                if (!isNaN(index) && index >= 0 && index < questions.length) {
                    currentQuestionIndex = index;
                    loadQuestion(currentQuestionIndex);
                    localStorage.setItem('lastPracticeIndex', currentQuestionIndex.toString());
                    closeSidebar();
                }
            });
            
            // 应用筛选
            elements.applyFilterBtn.addEventListener('click', applyFilter);
            
            // 练习模式切换
            elements.practiceModeToggle.addEventListener('change', (e) => {
                practiceMode = e.target.checked;
                localStorage.setItem('practiceMode', practiceMode.toString());
                showToast('success', '设置已保存', practiceMode ? '已切换到练习模式' : '已切换到测试模式');
            });
            
            // 重置刷题记录
            elements.resetRecordsBtn.addEventListener('click', () => {
                if (confirm('确定要重置所有刷题记录吗？此操作不可恢复。')) {
                    resetRecords();
                    showToast('success', '操作成功', '刷题记录已重置');
                }
            });
            
            // 题库管理
            elements.importBtn.addEventListener('click', importQuestionBank);
            elements.importFile.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    importQuestionBank();
                }
            });
            elements.generateHtmlBtn.addEventListener('click', generateStandaloneHtml);
            elements.downloadTemplateBtn.addEventListener('click', downloadQuestionTemplate);
            
            // 错题集相关
            elements.startWrongPracticeBtn.addEventListener('click', startWrongPractice);
            elements.viewWrongSetBtn.addEventListener('click', showWrongSet);
            elements.closeWrongPanelBtn.addEventListener('click', closeWrongPanel);
            
            // 状态面板相关
            elements.closeStatusPanelBtn.addEventListener('click', closeStatusPanel);
            
            // 关闭提示消息
            elements.closeToastBtn.addEventListener('click', hideToast);
            
            // 宫格导航相关
            elements.gridNavBtn.addEventListener('click', toggleGridNav);
            elements.gridNavOverlay.addEventListener('click', closeGridNav);
            elements.closeGridNavBtn.addEventListener('click', closeGridNav);
            
            // 点击外部关闭用户菜单
            document.addEventListener('click', (e) => {
                if (!elements.userMenuBtn.contains(e.target) && !elements.userMenu.contains(e.target)) {
                    elements.userMenu.classList.add('hidden');
                }
            });
        }
        
        // 切换主题
        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            }
            
            // 重新渲染图标
            lucide.createIcons();
        }
        
        // 切换用户菜单
        function toggleUserMenu() {
            elements.userMenu.classList.toggle('hidden');
        }
        
        // 打开侧边栏
        function openSidebar() {
            elements.sidebar.classList.add('active');
            elements.overlay.classList.add('active');
        }
        
        // 关闭侧边栏
        function closeSidebar() {
            elements.sidebar.classList.remove('active');
            if (!elements.wrongPanel.classList.contains('active') && !elements.statusPanel.classList.contains('active')) {
                elements.overlay.classList.remove('active');
            }
        }
        
        // 显示错题集
        function showWrongSet() {
            updateWrongList();
            elements.wrongPanel.classList.add('active');
            elements.overlay.classList.add('active');
            elements.sidebar.classList.remove('active');
        }
        
        // 关闭错题集
        function closeWrongPanel() {
            elements.wrongPanel.classList.remove('active');
            if (!elements.sidebar.classList.contains('active') && !elements.statusPanel.classList.contains('active')) {
                elements.overlay.classList.remove('active');
            }
        }
        
        // 显示状态面板
        function showStatusPanel(status) {
            const statusLabels = {
                'correct': '正确题目',
                'incorrect': '错误题目',
                'unanswered': '未答题目'
            };
            
            elements.statusPanelTitle.textContent = statusLabels[status] || '题目列表';
            elements.statusPanel.classList.add('active');
            elements.overlay.classList.add('active');
            elements.sidebar.classList.remove('active');
            elements.wrongPanel.classList.remove('active');
            
            updateStatusList(status);
        }
        
        // 关闭状态面板
        function closeStatusPanel() {
            elements.statusPanel.classList.remove('active');
            if (!elements.sidebar.classList.contains('active') && !elements.wrongPanel.classList.contains('active')) {
                elements.overlay.classList.remove('active');
            }
        }
        
        // 关闭所有面板
        function closeAllPanels() {
            elements.sidebar.classList.remove('active');
            elements.wrongPanel.classList.remove('active');
            elements.statusPanel.classList.remove('active');
            elements.overlay.classList.remove('active');
        }
        
        // 处理选项点击
        function handleOptionClick(option) {
            const question = questions[currentQuestionIndex];
            const isMultipleChoice = question.题目类型 && question.题目类型.includes('多选');
            
            if (isMultipleChoice) {
                // 多选题：切换选中状态
                option.classList.toggle('selected');
            } else {
                // 单选题：清除其他选项的选中状态
                document.querySelectorAll('.option').forEach(opt => {
                    opt.classList.remove('selected');
                });
                // 选中当前选项
                option.classList.add('selected');
            }
        }
        
        // 处理提交答案
        function handleSubmit() {
            const question = questions[currentQuestionIndex];
            const isMultipleChoice = question.题目类型 && question.题目类型.includes('多选');
            const selectedOptions = document.querySelectorAll('.option.selected');
            
            if (selectedOptions.length === 0) {
                showToast('warning', '提示', '请选择答案');
                return;
            }
            
            let userAnswer;
            if (isMultipleChoice) {
                // 多选题：按字母顺序组合答案
                userAnswer = Array.from(selectedOptions)
                    .map(opt => opt.dataset.option)
                    .sort()
                    .join('');
            } else {
                // 单选题/判断题：直接使用选择的答案
                userAnswer = selectedOptions[0].dataset.option;
            }
            
            const isCorrect = userAnswer === question.标准答案;
            
            // 保存之前的状态
            const previousStatus = questionStatus[currentQuestionIndex];
            
            // 更新状态
            if (isCorrect) {
                questionStatus[currentQuestionIndex] = 'correct';
                
                // 更新计数
                if (previousStatus !== 'correct') {
                    if (previousStatus === 'incorrect') {
                        incorrectCount--;
                    }
                    correctCount++;
                }
                
                // 显示正确反馈
                showFeedback('correct', `回答正确！正确答案是：${question.标准答案}`);
            } else {
                questionStatus[currentQuestionIndex] = 'incorrect';
                
                // 更新计数
                if (previousStatus !== 'incorrect') {
                    if (previousStatus === 'correct') {
                        correctCount--;
                    }
                    incorrectCount++;
                }
                
                // 显示错误反馈
                showFeedback('incorrect', `回答错误！正确答案是：${question.标准答案}`);
            }
            
            // 显示解析
            showExplanation(question.解析 || '无解析');
            
            // 标记正确/错误选项
            markOptions(question.标准答案, userAnswer);
            
            // 保存答案
            userAnswers[currentQuestionIndex] = userAnswer;
            localStorage.setItem('userAnswers', JSON.stringify(userAnswers));
            localStorage.setItem('questionStatus', JSON.stringify(questionStatus));
            localStorage.setItem('lastPracticeIndex', currentQuestionIndex.toString());
            
            // 更新统计
            updateStats();
            updateProgress();
            updateWrongCount();
            updateGridNav(); // 更新宫格导航状态
            
            // 禁用提交按钮
            elements.submitBtn.disabled = true;
        }
        
        // 显示反馈
        function showFeedback(type, message) {
            elements.feedback.className = `mb-4 p-4 rounded-lg border ${type === 'correct' ? 'bg-green-50 text-green-800 border-green-200 dark:bg-green-900/20 dark:text-green-300 dark:border-green-800' : 'bg-red-50 text-red-800 border-red-200 dark:bg-red-900/20 dark:text-red-300 dark:border-red-800'}`;
            elements.feedback.innerHTML = `
                <div class="flex items-start">
                    <i data-lucide="${type === 'correct' ? 'check-circle' : 'x-circle'}" class="w-6 h-6 mr-3 mt-0.5 ${type === 'correct' ? 'text-green-500' : 'text-red-500'}"></i>
                    <p>${message}</p>
                </div>
            `;
            elements.feedback.classList.remove('hidden');
            
            // 重新渲染图标
            lucide.createIcons();
        }
        
        // 显示解析
        function showExplanation(text) {
            elements.explanationText.textContent = text;
            elements.explanation.classList.remove('hidden');
        }
        
        // 标记选项
        function markOptions(correctAnswer, userAnswer) {
            const isMultipleChoice = correctAnswer.length > 1;
            
            document.querySelectorAll('.option').forEach(option => {
                const optionKey = option.dataset.option;
                
                if (isMultipleChoice) {
                    // 多选题
                    const isCorrectOption = correctAnswer.includes(optionKey);
                    const isSelectedByUser = userAnswer.includes(optionKey);
                    
                    if (isCorrectOption && isSelectedByUser) {
                        // 正确且被选中
                        option.classList.add('bg-green-50', 'border-green-500', 'dark:bg-green-900/20', 'dark:border-green-500');
                        option.querySelector('.option-marker').classList.add('bg-green-500', 'text-white', 'border-green-500');
                    } else if (isCorrectOption && !isSelectedByUser) {
                        // 正确但未被选中
                        option.classList.add('bg-yellow-50', 'border-yellow-500', 'dark:bg-yellow-900/20', 'dark:border-yellow-500');
                        option.querySelector('.option-marker').classList.add('bg-yellow-500', 'text-white', 'border-yellow-500');
                    } else if (!isCorrectOption && isSelectedByUser) {
                        // 错误且被选中
                        option.classList.add('bg-red-50', 'border-red-500', 'dark:bg-red-900/20', 'dark:border-red-500');
                        option.querySelector('.option-marker').classList.add('bg-red-500', 'text-white', 'border-red-500');
                    }
                } else {
                    // 单选题
                    if (optionKey === correctAnswer) {
                        // 正确答案
                        option.classList.add('bg-green-50', 'border-green-500', 'dark:bg-green-900/20', 'dark:border-green-500');
                        option.querySelector('.option-marker').classList.add('bg-green-500', 'text-white', 'border-green-500');
                    } else if (optionKey === userAnswer) {
                        // 用户选择的错误答案
                        option.classList.add('bg-red-50', 'border-red-500', 'dark:bg-red-900/20', 'dark:border-red-500');
                        option.querySelector('.option-marker').classList.add('bg-red-500', 'text-white', 'border-red-500');
                    }
                }
            });
        }
        
        // 处理上一题
        function handlePrev() {
            if (wrongPracticeMode) {
                // 刷错题模式：跳转到上一道错题
                if (wrongPracticeCurrent > 0) {
                    wrongPracticeCurrent--;
                    const prevWrongIndex = wrongPracticeQuestions[wrongPracticeCurrent].index;
                    currentQuestionIndex = prevWrongIndex;
                    loadQuestion(currentQuestionIndex);
                    localStorage.setItem('lastPracticeIndex', currentQuestionIndex.toString());
                }
            } else {
                // 普通模式：跳转到上一题
                if (currentQuestionIndex > 0) {
                    currentQuestionIndex--;
                    loadQuestion(currentQuestionIndex);
                    localStorage.setItem('lastPracticeIndex', currentQuestionIndex.toString());
                }
            }
        }
        
        // 处理下一题
        function handleNext() {
            if (wrongPracticeMode) {
                // 刷错题模式：跳转到下一道错题
                wrongPracticeCurrent++;
                if (wrongPracticeCurrent < wrongPracticeQuestions.length) {
                    const nextWrongIndex = wrongPracticeQuestions[wrongPracticeCurrent].index;
                    
                    // 重置下一道错题的状态，允许重新回答
                    questionStatus[nextWrongIndex] = 'unanswered';
                    userAnswers[nextWrongIndex] = null;
                    
                    // 更新统计
                    incorrectCount--;
                    updateStats();
                    updateProgress();
                    updateWrongCount();
                    
                    // 保存更新后的状态
                    localStorage.setItem('userAnswers', JSON.stringify(userAnswers));
                    localStorage.setItem('questionStatus', JSON.stringify(questionStatus));
                    
                    // 跳转到下一道错题
                    currentQuestionIndex = nextWrongIndex;
                    loadQuestion(currentQuestionIndex);
                    localStorage.setItem('lastPracticeIndex', currentQuestionIndex.toString());
                } else {
                    // 所有错题都已刷完
                    wrongPracticeMode = false;
                    wrongPracticeQuestions = [];
                    wrongPracticeCurrent = 0;
                    
                    showToast('success', '刷错题完成', '您已完成所有错题的重新练习！');
                }
            } else {
                // 普通模式：跳转到下一题
                if (currentQuestionIndex < questions.length - 1) {
                    currentQuestionIndex++;
                    loadQuestion(currentQuestionIndex);
                    localStorage.setItem('lastPracticeIndex', currentQuestionIndex.toString());
                }
            }
        }
        
        // 加载题目
        function loadQuestion(index) {
            if (!questions || index < 0 || index >= questions.length) {
                console.error('Invalid question index:', index);
                return;
            }
            
            const question = questions[index];
            if (!question) {
                console.error('Invalid question at index:', index);
                return;
            }
            
            // 显示题目信息
            elements.currentQuestion.textContent = `第 ${index + 1} 题`;
            elements.questionModule.textContent = question.模块 || '';
            elements.questionType.textContent = question.题目类型 || '';
            elements.questionId.textContent = `ID: ${String(question.ID || (index + 1)).padStart(3, '0')}`;
            elements.questionText.textContent = question.题目 || '';
            
            // 显示选项
            const options = ['A', 'B', 'C', 'D'];
            const isJudgment = question.题目类型 && question.题目类型.includes('判断');
            
            if (isJudgment) {
                // 判断题：自动生成正确/错误选项
                const optionA = document.querySelector('.option[data-option="A"]');
                const optionB = document.querySelector('.option[data-option="B"]');
                
                if (optionA) {
                    optionA.querySelector('.option-text').textContent = '正确';
                    optionA.style.display = 'block';
                }
                
                if (optionB) {
                    optionB.querySelector('.option-text').textContent = '错误';
                    optionB.style.display = 'block';
                }
                
                // 隐藏C、D选项
                options.forEach(option => {
                    if (option === 'C' || option === 'D') {
                        const optionElement = document.querySelector(`.option[data-option="${option}"]`);
                        if (optionElement) {
                            optionElement.style.display = 'none';
                        }
                    }
                });
            } else {
                // 单选题/多选题：显示正常选项
                options.forEach(option => {
                    const optionElement = document.querySelector(`.option[data-option="${option}"]`);
                    if (optionElement) {
                        const optionText = question[`选项${option}`];
                        if (optionText) {
                            optionElement.querySelector('.option-text').textContent = optionText;
                            optionElement.style.display = 'block';
                        } else {
                            optionElement.style.display = 'none';
                        }
                    }
                });
            }
            
            // 重置选项状态
            resetOptions();
            
            // 隐藏反馈和解析
            elements.feedback.classList.add('hidden');
            elements.explanation.classList.add('hidden');
            
            // 注意：选项点击事件已在setupEventListeners中绑定，这里不需要重复绑定
            
            // 启用/禁用提交按钮
            elements.submitBtn.disabled = questionStatus[index] !== 'unanswered';
            
            // 更新导航按钮状态
            elements.prevBtn.disabled = currentQuestionIndex === 0;
            elements.nextBtn.disabled = currentQuestionIndex === questions.length - 1;
            
            // 如果题目已回答，显示之前的结果
            if (questionStatus[index] !== 'unanswered') {
                const userAnswer = userAnswers[index];
                const correctAnswer = question.标准答案;
                const isCorrect = userAnswer === correctAnswer;
                
                // 显示之前的选择
                if (correctAnswer.length > 1) {
                    // 多选题
                    for (let i = 0; i < userAnswer.length; i++) {
                        const optionKey = userAnswer[i];
                        const option = document.querySelector(`.option[data-option="${optionKey}"]`);
                        if (option) {
                            option.classList.add('selected');
                        }
                    }
                } else {
                    // 单选题/判断题
                    let optionKey = userAnswer;
                    if (isJudgment) {
                        // 判断题：将文字答案转换为选项键
                        optionKey = userAnswer === '正确' ? 'A' : 'B';
                    }
                    const option = document.querySelector(`.option[data-option="${optionKey}"]`);
                    if (option) {
                        option.classList.add('selected');
                    }
                }
                
                // 显示反馈和解析
                showFeedback(isCorrect ? 'correct' : 'incorrect', isCorrect ? `回答正确！正确答案是：${correctAnswer}` : `回答错误！正确答案是：${correctAnswer}`);
                showExplanation(question.解析 || '无解析');
                
                // 标记选项
                markOptions(correctAnswer, userAnswer);
            }
        }
        
        // 重置选项状态
        function resetOptions() {
            document.querySelectorAll('.option').forEach(option => {
                option.classList.remove('selected', 'bg-green-50', 'bg-red-50', 'bg-yellow-50', 'border-green-500', 'border-red-500', 'border-yellow-500', 'dark:bg-green-900/20', 'dark:bg-red-900/20', 'dark:bg-yellow-900/20', 'dark:border-green-500', 'dark:border-red-500', 'dark:border-yellow-500');
                
                const marker = option.querySelector('.option-marker');
                marker.classList.remove('bg-green-500', 'bg-red-500', 'bg-yellow-500', 'text-white', 'border-green-500', 'border-red-500', 'border-yellow-500');
                marker.classList.add('border-gray-300', 'dark:border-gray-600');
            });
        }
        
        // 更新统计

        // ═══════════════════════════════════════════════════════════════
        // 模块三：UI更新层 - 统计、进度、选择器、错题列表、状态列表
        // ═══════════════════════════════════════════════════════════════
        function updateStats() {
            elements.correctCount.textContent = correctCount;
            elements.incorrectCount.textContent = incorrectCount;
            elements.remainingCount.textContent = questions.length - (correctCount + incorrectCount);
            
            // 更新正确率和完成率
            const answered = correctCount + incorrectCount;
            const accuracy = answered > 0 ? Math.round((correctCount / answered) * 100) : 0;
            const completion = questions.length > 0 ? Math.round((answered / questions.length) * 100) : 0;
            
            elements.accuracyRate.textContent = `${accuracy}%`;
            elements.completionRate.textContent = `${completion}%`;
            
            // 更新学习时长
            updateStudyTime();
        }
        
        // 更新进度条
        function updateProgress() {
            const answered = correctCount + incorrectCount;
            const progress = questions.length > 0 ? (answered / questions.length) * 100 : 0;
            
            // 使用GSAP动画平滑过渡
            gsap.to(elements.progressFill, {
                width: `${progress}%`,
                duration: 0.5,
                ease: "power2.out"
            });
        }
        
        // 填充题目选择器
        function populateQuestionSelect() {
            elements.questionSelect.innerHTML = '';
            questions.forEach((question, index) => {
                const option = document.createElement('option');
                option.value = index;
                
                // 根据答题状态添加不同的前缀
                let prefix = '';
                if (questionStatus[index] === 'correct') {
                    prefix = '✓ ';
                } else if (questionStatus[index] === 'incorrect') {
                    prefix = '✗ ';
                } else {
                    prefix = '○ ';
                }
                
                option.textContent = `${prefix}第 ${index + 1} 题 (${question.模块})`;
                elements.questionSelect.appendChild(option);
            });
        }
        
        // 更新错题数量
        function updateWrongCount() {
            const wrongCount = questionStatus.filter(status => status === 'incorrect').length;
            elements.wrongCount.textContent = wrongCount;
            elements.wrongPanelCount.textContent = wrongCount;
            
            // 启用/禁用刷错题按钮
            elements.startWrongPracticeBtn.disabled = wrongCount === 0;
        }
        
        // 更新错题列表
        function updateWrongList() {
            const wrongQuestions = [];
            questionStatus.forEach((status, index) => {
                if (status === 'incorrect') {
                    wrongQuestions.push({ index, question: questions[index] });
                }
            });
            
            if (wrongQuestions.length === 0) {
                elements.wrongList.innerHTML = `
                    <div class="text-center text-gray-500 dark:text-gray-400 py-8">
                        <i data-lucide="check-circle" class="w-12 h-12 mx-auto mb-2 text-green-500"></i>
                        <p>太棒了！暂无错题</p>
                    </div>
                `;
            } else {
                let html = '';
                wrongQuestions.forEach((item, i) => {
                    html += `
                        <div class="wrong-item p-3 bg-gray-50 dark:bg-gray-700/50 rounded-lg cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" data-index="${item.index}">
                            <div class="flex justify-between items-start mb-2">
                                <span class="font-medium">第 ${item.index + 1} 题</span>
                                <span class="badge badge-danger">答错</span>
                            </div>
                            <p class="text-sm mb-2 line-clamp-2">${item.question.题目}</p>
                            <div class="flex justify-between items-center text-xs text-gray-500 dark:text-gray-400">
                                <span>模块：${item.question.模块}</span>
                                <span>正确答案：${item.question.标准答案}</span>
                            </div>
                        </div>
                    `;
                });
                elements.wrongList.innerHTML = html;
                
                // 绑定错题点击事件
                elements.wrongList.querySelectorAll('.wrong-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const index = parseInt(item.dataset.index);
                        currentQuestionIndex = index;
                        loadQuestion(currentQuestionIndex);
                        localStorage.setItem('lastPracticeIndex', currentQuestionIndex.toString());
                        closeWrongPanel();
                    });
                });
            }
            
            // 重新渲染图标
            lucide.createIcons();
        }
        
        // 更新状态列表
        function updateStatusList(status) {
            const statusQuestions = [];
            questionStatus.forEach((questionStatus, index) => {
                if (questionStatus === status) {
                    statusQuestions.push({ index, question: questions[index] });
                }
            });
            
            const statusLabels = {
                'correct': { text: '正确', class: 'badge-success', icon: 'check-circle' },
                'incorrect': { text: '错误', class: 'badge-danger', icon: 'x-circle' },
                'unanswered': { text: '未答', class: 'badge-warning', icon: 'circle' }
            };
            
            const config = statusLabels[status] || statusLabels.unanswered;
            
            if (statusQuestions.length === 0) {
                elements.statusList.innerHTML = `
                    <div class="text-center text-gray-500 dark:text-gray-400 py-8">
                        <i data-lucide="${config.icon}" class="w-12 h-12 mx-auto mb-2 text-gray-400"></i>
                        <p>暂无${config.text}题目</p>
                    </div>
                `;
            } else {
                let html = '';
                
                // 如果是错误题目列表，添加"开始刷错题"按钮
                if (status === 'incorrect' && statusQuestions.length > 0) {
                    html += `
                        <div class="mb-4">
                            <button id="start-status-wrong-practice-btn" class="btn-danger w-full mb-3">
                                <i data-lucide="alert-circle" class="w-5 h-5 inline-block mr-2"></i>
                                开始刷这些错题
                            </button>
                            <div class="text-xs text-gray-500 dark:text-gray-400 text-center">
                                共 ${statusQuestions.length} 道错题，点击按钮开始重新练习
                            </div>
                        </div>
                    `;
                }
                
                statusQuestions.forEach((item, i) => {
                    html += `
                        <div class="status-item p-3 bg-gray-50 dark:bg-gray-700/50 rounded-lg cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" data-index="${item.index}">
                            <div class="flex justify-between items-start mb-2">
                                <span class="font-medium">第 ${item.index + 1} 题</span>
                                <span class="badge ${config.class}">${config.text}</span>
                            </div>
                            <p class="text-sm mb-2 line-clamp-2">${item.question.题目}</p>
                            <div class="flex justify-between items-center text-xs text-gray-500 dark:text-gray-400">
                                <span>模块：${item.question.模块}</span>
                                <span>类型：${item.question.题目类型}</span>
                            </div>
                        </div>
                    `;
                });
                elements.statusList.innerHTML = html;
                
                // 绑定状态列表点击事件
                elements.statusList.querySelectorAll('.status-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const index = parseInt(item.dataset.index);
                        currentQuestionIndex = index;
                        loadQuestion(currentQuestionIndex);
                        localStorage.setItem('lastPracticeIndex', currentQuestionIndex.toString());
                        closeStatusPanel();
                    });
                });
                
                // 绑定"开始刷错题"按钮事件
                const startWrongBtn = document.getElementById('start-status-wrong-practice-btn');
                if (startWrongBtn) {
                    startWrongBtn.addEventListener('click', () => {
                        // 使用当前筛选的错题列表开始刷错题
                        wrongPracticeQuestions = statusQuestions.map(item => ({
                            index: item.index,
                            question: item.question
                        }));
                        
                        // 打乱错题顺序
                        wrongPracticeQuestions.sort(() => 0.5 - Math.random());
                        wrongPracticeCurrent = 0;
                        wrongPracticeMode = true;
                        
                        // 重置当前错题的状态，允许重新回答
                        const firstWrongIndex = wrongPracticeQuestions[0].index;
                        questionStatus[firstWrongIndex] = 'unanswered';
                        userAnswers[firstWrongIndex] = null;
                        
                        // 更新统计
                        incorrectCount--;
                        updateStats();
                        updateProgress();
                        updateWrongCount();
                        
                        // 保存更新后的状态
                        localStorage.setItem('userAnswers', JSON.stringify(userAnswers));
                        localStorage.setItem('questionStatus', JSON.stringify(questionStatus));
                        
                        // 跳转到第一道错题
                        currentQuestionIndex = firstWrongIndex;
                        loadQuestion(currentQuestionIndex);
                        
                        // 关闭状态面板
                        closeStatusPanel();
                        
                        showToast('success', '开始刷错题', `共有 ${wrongPracticeQuestions.length} 道错题，您可以重新回答这些题目`);
                    });
                }
            }
            
            // 重新渲染图标
            lucide.createIcons();
        }
        
        // 开始刷错题

        // ═══════════════════════════════════════════════════════════════
        // 模块四：功能层 - 刷错题、筛选、重置、模板下载、选择器更新、计时器、提示消息
        // ═══════════════════════════════════════════════════════════════
        function startWrongPractice() {
            // 筛选错题
            wrongPracticeQuestions = [];
            questionStatus.forEach((status, index) => {
                if (status === 'incorrect') {
                    wrongPracticeQuestions.push({ index, question: questions[index] });
                }
            });
            
            if (wrongPracticeQuestions.length === 0) {
                showToast('info', '提示', '暂无错题可刷');
                return;
            }
            
            // 打乱错题顺序
            wrongPracticeQuestions.sort(() => 0.5 - Math.random());
            wrongPracticeCurrent = 0;
            wrongPracticeMode = true;
            
            // 重置当前错题的状态，允许重新回答
            const firstWrongIndex = wrongPracticeQuestions[0].index;
            questionStatus[firstWrongIndex] = 'unanswered';
            userAnswers[firstWrongIndex] = null;
            
            // 更新统计
            incorrectCount--;
            updateStats();
            updateProgress();
            updateWrongCount();
            
            // 保存更新后的状态
            localStorage.setItem('userAnswers', JSON.stringify(userAnswers));
            localStorage.setItem('questionStatus', JSON.stringify(questionStatus));
            
            // 跳转到第一道错题
            currentQuestionIndex = firstWrongIndex;
            loadQuestion(currentQuestionIndex);
            
            // 关闭侧边栏
            closeSidebar();
            
            showToast('success', '开始刷错题', `共有 ${wrongPracticeQuestions.length} 道错题，您可以重新回答这些题目`);
        }
        
        // 应用筛选
        function applyFilter() {
            const moduleFilter = elements.moduleSelect.value;
            const typeFilter = elements.typeSelect.value;
            const statusFilter = elements.statusSelect.value;
            
            // 筛选题目
            const filteredQuestions = questions.filter((question, index) => {
                const moduleMatch = moduleFilter === 'all' || question.模块 === moduleFilter;
                const typeMatch = typeFilter === 'all' || question.题目类型 === typeFilter;
                const statusMatch = statusFilter === 'all' || questionStatus[index] === statusFilter;
                
                return moduleMatch && typeMatch && statusMatch;
            });
            
            if (filteredQuestions.length === 0) {
                showToast('warning', '提示', '没有符合条件的题目');
                return;
            }
            
            // 更新题目选择器
            elements.questionSelect.innerHTML = '';
            filteredQuestions.forEach((question, i) => {
                const index = questions.indexOf(question);
                const option = document.createElement('option');
                option.value = index;
                
                // 根据答题状态添加不同的前缀
                let prefix = '';
                if (questionStatus[index] === 'correct') {
                    prefix = '✓ ';
                } else if (questionStatus[index] === 'incorrect') {
                    prefix = '✗ ';
                } else {
                    prefix = '○ ';
                }
                
                option.textContent = `${prefix}第 ${index + 1} 题 (${question.模块})`;
                elements.questionSelect.appendChild(option);
            });
            
            // 自动跳转到筛选结果的第一题
            const firstFilteredIndex = questions.indexOf(filteredQuestions[0]);
            if (firstFilteredIndex !== -1) {
                currentQuestionIndex = firstFilteredIndex;
                loadQuestion(currentQuestionIndex);
                // 更新题目选择器的选中项
                elements.questionSelect.value = firstFilteredIndex;
            }
            
            showToast('success', '筛选成功', `找到 ${filteredQuestions.length} 道符合条件的题目`);
        }
        
        // 重置刷题记录
        function resetRecords() {
            userAnswers = new Array(questions.length).fill(null);
            questionStatus = new Array(questions.length).fill('unanswered');
            correctCount = 0;
            incorrectCount = 0;
            studyTime = 0;
            
            localStorage.setItem('userAnswers', JSON.stringify(userAnswers));
            localStorage.setItem('questionStatus', JSON.stringify(questionStatus));
            localStorage.setItem('studyTime', '0');
            
            updateStats();
            updateProgress();
            updateWrongCount();
            populateQuestionSelect();
            loadQuestion(currentQuestionIndex);
        }
